<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Harvest — Agricultural platform for farmers, buyers, and agriculture officers in Sri Lanka">
  <meta name="theme-color" content="#2E7D32">

  <!-- iOS PWA meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Harvest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Smart Harvest</title>

  <style>
    /* Loading screen shown before Flutter initialises */
    body {
      margin: 0;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading {
      text-align: center;
    }
    #loading .logo {
      width: 80px;
      height: 80px;
      background-color: #2E7D32;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    #loading h2 {
      color: #2E7D32;
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
    }
    #loading p {
      color: #757575;
      margin: 0;
      font-size: 13px;
    }
    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E8F5E9;
      border-top-color: #2E7D32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Shown while Flutter loads -->
  <div id="loading">
    <div class="logo">🌿</div>
    <h2>Smart Harvest</h2>
    <p>Agricultural Platform · Sri Lanka</p>
    <div class="spinner"></div>
  </div>

  <script>
    // Hide the loading screen once Flutter has rendered its first frame
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
