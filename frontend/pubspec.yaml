name: smart_harvest_app
description: A Flutter mobile app for farmers, buyers, and agriculture officers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^7.7.0

  # Firebase (COMPATIBLE SET)
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.5
  firebase_messaging: ^14.7.19

  # Google Sign In
  google_sign_in: ^6.2.1

  # Network
  http: ^1.2.0
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Image Picker
  image_picker: ^1.1.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^6.0.3

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/icons/