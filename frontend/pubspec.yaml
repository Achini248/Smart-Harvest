name: smart_harvest_app
description: A Flutter mobile app for farmers, buyers, and agriculture officers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^9.2.1

  # Firebase (ALIGNED VERSIONS)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2

  # Network
  http: ^1.1.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.9

  # Image Picker
  image_picker: ^1.0.7

  # Google Sign-In
  google_sign_in: ^7.2.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.0.0

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.1
  build_runner: ^2.4.7  # optional for code generation

flutter:
  uses-material-design: true